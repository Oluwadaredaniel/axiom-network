name: Feature Request
description: Suggest an idea for Axiom
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting a feature for Axiom.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What would you like to see implemented?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternatives have you considered?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend
        - API
        - Conductor
        - Wallet
        - Marketplace
        - Documentation
        - CI / Build
        - Protocol (x402)
        - Other