name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to fill out this bug report.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Output
      description: Please copy and paste any relevant log output
      render: shell
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend
        - API
        - Conductor
        - Wallet
        - Marketplace
        - Documentation
        - CI / Build
        - Other
  - type: input
    id: version
    attributes:
      label: Version
      description: Git commit hash or version tag